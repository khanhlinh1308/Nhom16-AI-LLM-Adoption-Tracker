services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: ai_tracker_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: ai_tracker_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ai_tracker_redis
    ports:
      - "6379:6379"

  spark-master:
    image: apache/spark:3.5.0-python3
    container_name: ai_tracker_spark_master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master", "--host", "0.0.0.0"]
    ports:
      - "7077:7077"
      - "8080:8080"

  spark-worker:
    image: apache/spark:3.5.0-python3
    container_name: ai_tracker_spark_worker
    depends_on:
      - spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077", "--memory", "2G", "--cores", "2"]

  github_collector:
    image: python:3.11-slim
    container_name: ai_tracker_github_collector
    depends_on:
      kafka:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      KAFKA_BROKER: kafka:9092
    command: sh -c "pip install requests kafka-python python-dotenv && python src/ingestion/github_collector.py"
    restart: unless-stopped

  spark_streaming:
    image: apache/spark:3.5.0-python3
    container_name: ai_tracker_spark_streaming
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
      spark-master:
        condition: service_started
    working_dir: /app
    user: root
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      KAFKA_BROKER: kafka:9092
      REDIS_HOST: redis
    command: >
      bash -lc "python3 -m pip install --user --no-cache-dir redis==5.0.1 python-dotenv==1.0.1 &&
      /opt/spark/bin/spark-submit --master spark://spark-master:7077
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0
      src/processing/spark_streaming.py"
    restart: unless-stopped

  streamlit:
    image: python:3.11-slim
    container_name: ai_tracker_streamlit
    depends_on:
      - redis
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
    ports:
      - "8501:8501"
    command: sh -c "pip install streamlit pandas redis python-dotenv numpy && streamlit run src/visualization/app.py --server.address=0.0.0.0 --server.port=8501"
    restart: unless-stopped
